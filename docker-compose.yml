version: '3.8'
services:
  pokemon_db:
    image: postgres:15-alpine
    container_name: pokemon_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pokemon_data:/var/lib/postgresql/data
    networks:
      - pokemon_network

  pokemon_api:
    build: .
    container_name: pokemon_prod_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - pokemon_db
    networks:
      - pokemon_network

networks:
  pokemon_network:
    driver: bridge

volumes:
  pokemon_data:
